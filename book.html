<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Ride - GoFast</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="book.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">🚗 GoFast</a>

<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link active" href="book.html">Book Ride</a></li>
</ul>
</div>
</nav>

<!-- MAIN -->
<div class="container mt-5">
<div class="row">

<!-- FORM -->
<div class="col-md-5">
<div class="card p-4 shadow">

<h3>Book Your Ride</h3>

<input id="pickup" class="form-control mb-3" placeholder="📍 Pickup Location">

<input id="drop" class="form-control mb-3" placeholder="📍 Drop Location">

<select id="rideType" class="form-control mb-3">
<option value="">Select Ride Type</option>
<option value="mini">Mini (₹10/km)</option>
<option value="sedan">Sedan (₹15/km)</option>
<option value="suv">SUV (₹20/km)</option>
</select>


<input id="name" class="form-control mb-3" placeholder="👤 Your Name">
<input id="phone" class="form-control mb-3" placeholder="📞 Phone Number">

<select class="form-control mb-3">
<option>Payment Method</option>
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>

<p id="fare" class="fw-bold">Estimated Fare: ₹0</p>

<button onclick="calculateFare()" class="btn btn-secondary mb-2">Calculate Fare</button>

<button onclick="bookRide()" class="btn btn-primary w-100">Confirm Ride</button>

<p id="status" class="mt-3 text-success"></p>

</div>
</div>

<!-- MAP -->
<div class="col-md-7">
<div id="map"></div>
</div>

</div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 GoFast Ride Booking
</footer>

<script src="book.js"></script>

<script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</body>
</html>
