<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - GoFast</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">🚗 GoFast</a>

<div class="ms-auto">
<a href="signup.html" class="btn btn-success">Sign Up</a>
</div>
</div>
</nav>

<!-- LOGIN FORM -->
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-4">

<div class="card p-4 shadow">
<h3 class="text-center mb-3">Login</h3>

<input id="loginUser" class="form-control mb-3" placeholder="Username">

<input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">Login</button>

<p class="mt-3 text-center">
Don't have an account? 
<a href="signup.html">Sign Up</a>
</p>

</div>

</div>
</div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 GoFast
</footer>

<script>
function login() {
    let storedUser = localStorage.getItem("user");
    let storedPass = localStorage.getItem("pass");

    let enteredUser = document.getElementById("loginUser").value;
    let enteredPass = document.getElementById("loginPass").value;

    if (enteredUser === storedUser && enteredPass === storedPass) {
        alert("Login Successful ✅");

        // SAVE LOGIN STATUS
        localStorage.setItem("loggedIn", "true");

        // REDIRECT
        window.location.href = "index.html"; // change to book.html if needed

    } else {
        alert("Invalid Username or Password ❌");
    }
}
</script>

</body>
</html>
